version: 0.2
runson: linux
concurrency: 2

env:
  MESSAGE: "Welcome to TestMu AI"

testDiscovery:
  type: raw
  mode: dynamic
  command: pytest tests --collect-only -q

testRunnerCommand: pytest $test -v --tb=short

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install chromium

cacheKey: pip-playwright-{{ checksum "requirements.txt" }}
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

artifacts:
  download:
    - playwright-report
    - test-results

post:
  - echo "Execution completed"
