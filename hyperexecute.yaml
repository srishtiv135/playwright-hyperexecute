version: 0.1
runson: linux
concurrency: 2

matrix:
  os: [win, linux]

env:
  MESSAGE: "Welcome to TestMu AI"

testSuites:
  - pytest tests/test_drag_slider.py -v --tb=short
  - pytest tests/test_input_form.py -v --tb=short
  - pytest tests/test_simple_form.py -v --tb=short

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install chromium

cacheKey: pip-playwright-{{ checksum "requirements.txt" }}
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

artifacts:
  download:
    - playwright-report
    - test-results

post:
  - echo "Execution completed"
```

---

**What the `matrix` block does:**

HyperExecute will create **2 parallel jobs**:
```
Job 1 → Windows → runs all 3 tests
Job 2 → Linux   → runs all 3 tests
        ↑ both at the same time
