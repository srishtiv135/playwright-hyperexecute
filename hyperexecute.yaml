version: 0.1

runson: linux

concurrency: 2

framework:
  name: pytest
  discoveryType: raw
  discoveryCommand: pytest tests --collect-only

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install

env:
  MESSAGE: "Welcome to TestMu AI"

cache:
  - venv
  - ~/.cache/ms-playwright

testRunner:
  command: pytest tests -n 2 -v

artifacts:
  download:
    - playwright-report
    - test-results

post:
  - echo "Execution completed"
