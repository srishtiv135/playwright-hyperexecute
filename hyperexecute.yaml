version: 0.1
runson: linux
concurrency: 2

env:
  MESSAGE: "Welcome to TestMu AI"
  LT_USERNAME: ${{ .secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ .secrets.LT_ACCESS_KEY }}

framework:
  name: pytest
  defaultContainerImage: lambdatest/pyrunner:latest
  discoveryType: raw
  discoveryCommand: pytest tests/ --collect-only -q
  testRunnerCommand: pytest $test -v --tb=short --junit-xml=test-results/result.xml

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install chromium
  - mkdir -p test-results/videos
  - mkdir -p playwright-report

cacheKey: pip-playwright-{{ checksum "requirements.txt" }}
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

artifacts:
  download:
    - test-results
    - playwright-report

post:
  - echo "Execution completed"
