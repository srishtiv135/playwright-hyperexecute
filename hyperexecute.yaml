version: 0.1

runtime:
  language: python
  version: "3.9"

runson: ${matrix.os}
concurrency: 2

matrix:
  os: [win, linux]

env:
  MESSAGE: "Welcome to TestMu AI"
  USE_LT_CLOUD: "true"
  LT_USERNAME: ${{ .secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ .secrets.LT_ACCESS_KEY }}

pre:
  - python -m pip install --upgrade pip
  - python -m pip install -r requirements.txt --force-reinstall --cache-dir ~/.cache/pip
  - python -m playwright install chromium
  - mkdir -p test-results/videos
  - mkdir -p playwright-report
  
cacheKey: "pip-playwright-v4"
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

testRunnerCommand: pytest tests/ -v --tb=short

mergeArtifacts: true

uploadArtefacts:
  - name: TestResults
    path:
      - test-results/
  - name: PlaywrightVideos
    path:
      - test-results/videos/

post:
  - echo "Execution completed"
