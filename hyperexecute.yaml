version: 0.1

runtime:
  language: python
  version: "3.9"

runson: ${matrix.os}
concurrency: 2

matrix:
  os: [win, linux]

env:
  MESSAGE: "Welcome to TestMu AI"
  USE_LT_CLOUD: "true"
  LT_USERNAME: ${{ .secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ .secrets.LT_ACCESS_KEY }}

pre:
  - python -m pip install --upgrade pip --force
  - python -m pip install playwright==1.44.0 --force-reinstall --ignore-installed
  - python -m pip install -r requirements.txt --force-reinstall --ignore-installed
  - python -m playwright install chromium
  - python -c "import playwright; print(playwright.__version__)"

cacheKey: "pip-playwright-v4"
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

testSuites:
  - python -m pytest tests/test_drag_slider.py -v --tb=short
  - python -m pytest tests/test_input_form.py -v --tb=short
  - python -m pytest tests/test_simple_form.py -v --tb=short

mergeArtifacts: true

uploadArtefacts:
  - name: TestResults
    path:
      - test-results/
  - name: PlaywrightVideos
    path:
      - test-results/videos/

post:
  - echo "Execution completed"
