version: 0.1
runson: linux
concurrency: 2

env:
  MESSAGE: "Welcome to TestMu AI"

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install chromium

testSuites:
  - pytest tests/test_drag_slider.py -v --tb=short
  - pytest tests/test_input_form.py -v --tb=short
  - pytest tests/test_simple_form.py -v --tb=short

cacheKey: pip-playwright-{{ checksum "requirements.txt" }}
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

artifacts:
  download:
    - playwright-report
    - test-results

post:
  - echo "Execution completed"
