version: 0.1
runson: linux
concurrency: 2

matrix:
  os: [win, linux]

env:
  MESSAGE: "Welcome to TestMu AI"
  LT_USERNAME: ${{ .secrets.LT_USERNAME }}
  LT_ACCESS_KEY: ${{ .secrets.LT_ACCESS_KEY }}

testSuites:
  - pytest tests/test_drag_slider.py -v --tb=short
  - pytest tests/test_input_form.py -v --tb=short
  - pytest tests/test_simple_form.py -v --tb=short

pre:
  - pip install -r requirements.txt
  - pip install pytest pytest-playwright pytest-xdist
  - playwright install chromium
  - mkdir -p test-results/videos
  - mkdir -p playwright-report

cacheKey: pip-playwright-{{ checksum "requirements.txt" }}
cacheDirectories:
  - ~/.cache/pip
  - ~/.cache/ms-playwright

artifacts:
  download:
    - test-results
    - playwright-report

post:
  - echo "Execution completed"
  - ls -la test-results/ || true
  - ls -la test-results/videos/ || true
